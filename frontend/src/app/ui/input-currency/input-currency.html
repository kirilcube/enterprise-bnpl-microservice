<div class="relative w-full">
  <input type="text"
         [id]="inputId()"
         inputmode="decimal"
         [placeholder]="placeholder()"
         [value]="inputValue()"
         (input)="handleInput($event)"
         class="w-full px-14 py-4 bg-neutral-100 hover:bg-neutral-120 rounded-lg outline-none focus:ring-2 focus:ring-brand-80 transition-all text-lg text-center"
  />
  <div class="absolute inset-y-0 right-0 flex items-center pr-4 pointer-events-none">
    <span class="text-sm font-medium text-gray-500">{{ currency() }}</span>
  </div>
</div>
