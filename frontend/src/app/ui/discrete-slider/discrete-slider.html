<input
  [id]="inputId()"
  type="range"
  [min]="min()"
  [max]="max()"
  [step]="step()"
  [value]="value()"
  (input)="updateValue($event)"
  class="w-full h-2 bg-gray-200 rounded-lg appearance-none cursor-pointer accent-brand-80 focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-80"
/>
