@if (isAnyMonthlyPayments()) {
  <div class="text-sm text-neutral-600 font-bold">
    <span>Monthly payment: </span>
      @if (monthlyPaymentsAllTheSame()) {
        <span>
        {{monthlyPaymentsInCents()[0] | centsToCurrency | currency:'MXN'}}
      </span>
      }
      @else {
        @if(isPaymentsInfoExpanded()){
          <button
            type="button"
            class="inline-flex flex-col text-left cursor-pointer ml-2  rounded-md transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-80"
            (click)="expandPaymentsInfo(false)"
            aria-expanded="true"
            aria-label="Collapse detailed monthly payments"
          >
            @for (cents of monthlyPaymentsInCents(); track $index // $index is acceptable here) {
              <span class="text-sm text-neutral-700 font-medium">
                Month {{ $index + 1 }}: {{cents | centsToCurrency | currency:'MXN'}}
              </span>
            }
          </button>
        } @else {
          <button
            type="button"
            class="cursor-pointer underline font-bold text-brand-80 hover:text-brand-100 transition-colors focus:outline-none focus-visible:ring-2 focus-visible:ring-brand-80 rounded px-1"
            (click)="expandPaymentsInfo(true)"
            aria-expanded="false"
            aria-label="Expand detailed monthly payments"
          >
            ~{{monthlyPaymentsInCents()[0] | centsToCurrency | currency:'MXN'}}
          </button>
        }
      }
  </div>
} @else {
  <div class="text-sm text-neutral-400 font-bold">
    <span>Monthly payment: ...</span>
  </div>
}
